name: Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      verdaccio:
        image: verdaccio/verdaccio:latest
        ports:
          - 4873:4873
        options: >-
          --entrypoint sh
          -c "
          cat <<'EOF' >/verdaccio/conf/config.yaml
          web:
            enable: false
          packages:
            "@domovoid/*":
              access: \$all
              publish: \$anonymous
              unpublish: \$anonymous
            "**":
              access: \$all
              publish: \$authenticated
              unpublish: \$authenticated
              proxy: npmjs
          EOF

          /usr/local/bin/verdaccio
          "
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm ci
      - run: pnpm run build
      - run: pnpm run tsc
      - run: pnpm run lint
      - run: pnpm exec prettier --check .
      - run: pnpm run knip
      - run: pnpm run depcheck
      - run: pnpm exec playwright test
        env:
          CLI_PATH: packages/cli/bin.js

      - name: Check coverage thresholds
        run: npm run coverage:check

      - name: Generate coverage report
        if: always()
        run: npm run coverage:report

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/
          retention-days: 30
