name: Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      verdaccio:
        image: verdaccio/verdaccio:latest
        ports:
          - 4873:4873
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - run: pnpm run tsc
      - run: pnpm run lint
      - run: pnpm exec prettier --check .
      - run: pnpm run knip
      - run: pnpm run depcheck

      - name: Apply Verdaccio config
        run: |
          CID=$(docker ps --filter name=verdaccio --format "{{.ID}}")
          docker cp verdaccio-config.yml "$CID:/verdaccio/conf/config.yaml"
          docker restart "$CID"
          timeout 30 bash -c 'until curl -sf http://localhost:4873/-/ping; do sleep 1; done'

      - name: Publish to Verdaccio
        run: pnpm publish -r --no-git-checks --access public --registry http://localhost:4873

      - name: Install from Verdaccio
        working-directory: test-sandbox
        run: npm i -D --registry http://localhost:4873/ @domovoid/cli@latest

      - run: pnpm exec playwright test

      - name: Normalize coverage paths
        run: pnpm run coverage:normalize

      - name: Check coverage thresholds
        run: pnpm run coverage:check

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/
          retention-days: 30
